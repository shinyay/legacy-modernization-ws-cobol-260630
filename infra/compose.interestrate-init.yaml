# infra/compose.interestrate-init.yaml — 06-interestrate rehost init job（ADR-0026,0027）
#
# 目的: マスタ「適用金利（interest rate）」を共有ランタイム image でコンテナ化し、
#       irate-load で ISAM 索引 interestrate.idx を生成する init_job を1つ起動する。
#       ローカル compose の "interestrate-init" が ACA Jobs の Manual(once) に対応。
#
# 起動ルート: 正規ローダ ops-master-load.sh interestrates（flock + audit best-effort）。
# ストレージ: subsystems/06-interestrate/data に seed(interestrates-mvp.dat) と索引が同居。
#   ACA では Azure Files マウントに対応（空開始のため seed 事前アップロードが必要）。
# ACA Jobs 写像: 共有 image `practice-bank:app-latest` 再利用（infra/job-master-load.yaml, MASTER=interestrates）。
services:
  interestrate-init:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: practice-bank-runtime:latest
    working_dir: /workspace
    environment:
      TZ: Asia/Tokyo
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PGHOST: ${PGHOST:-postgres}
      PGUSER: ${PGUSER:-cobol}
      PGPASSWORD: ${PGPASSWORD:-cobol}
      PGDATABASE: ${PGDATABASE:-banking}
    volumes:
      - interestrate-data:/workspace/subsystems/06-interestrate/data
    command:
      - bash
      - -lc
      - >-
        make -C subsystems/06-interestrate build &&
        bash subsystems/22-operations/src/ops-master-load.sh interestrates
    restart: "no"

volumes:
  interestrate-data:
    driver: local
