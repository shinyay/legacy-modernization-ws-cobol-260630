# infra/job-batch-daily.yaml — 日次バッチパイプラインの ACA Scheduled Job 写像（ADR-0026,0027）
#
# compose.batch-daily.yaml の "batch-daily" を Azure Container Apps の
# Schedule トリガ Job（cron 日次）に写像する。共有 image `practice-bank:app-latest` を再利用。
#
# 実行順（fail-fast）: 19-inti → 13-iacr → 15-ad → 16-fee → 17-stmt → 20-drain → recon-defer
# 正準エントリ: subsystems/22-operations/bin/ops-driver（OPS-DRIVER が env を読み OPS-BATCH-DAILY を CALL）。
#
# 依存（real-mode = OPS_DRY_RUN=N）:
#   - PostgreSQL: 既存 pg-practicebank-5901.postgres.database.azure.com（要 schema 適用: db/migration V1..V7）
#       ACA env → PG への到達性（Private/Firewall）と PGPASSWORD secret が必要。
#   - RabbitMQ: step20 drain で必要（RG 未作成 → 別途プロビジョン）。
#   既定は OPS_DRY_RUN=Y（副作用なしの安全スモーク）。安定後に N へ切替。
#
# Render（secret は 0600 temp に展開し、レンダー後に削除。リポジトリにコミットしない）:
#   export ENV_ID=$(az containerapp env show -n cae-practicebank -g rg-practicebank --query id -o tsv)
#   export ACR_USER=$(az acr credential show -n acrpracticebank45261 --query username -o tsv)
#   export ACR_PW=$(az acr credential show -n acrpracticebank45261 --query "passwords[0].value" -o tsv)
#   # PGPASSWORD はモデル経由禁止。ターミナルに直接入力した値を使う。
#   （heredoc レンダー → az containerapp job create --yaml ...）
location: Japan East
properties:
  environmentId: ${ENV_ID}
  configuration:
    triggerType: Schedule
    replicaTimeout: 3600
    replicaRetryLimit: 1
    scheduleTriggerConfig:
      # JST 02:00 = UTC 17:00（前日）。既存 bicep jobDaily に合わせて調整可。
      cronExpression: "0 17 * * *"
      parallelism: 1
      replicaCompletionCount: 1
    registries:
      - server: acrpracticebank45261.azurecr.io
        username: ${ACR_USER}
        passwordSecretRef: acr-pwd
    secrets:
      - name: acr-pwd
        value: "${ACR_PW}"
      - name: pg-pwd
        value: "${PGPASSWORD}"
  template:
    containers:
      - image: acrpracticebank45261.azurecr.io/practice-bank:app-latest
        name: batch-daily
        env:
          - name: OPS_MODE
            value: "D"
          - name: OPS_DRY_RUN
            value: "N"
          - name: OPS_BATCH_ID
            value: "MVP-DAILY"
          - name: OPS_BUSINESS_DATE
            value: "20260630"
          - name: PGHOST
            value: "pg-practicebank-5901.postgres.database.azure.com"
          - name: PGUSER
            value: "cobol"
          - name: PGDATABASE
            value: "banking"
          - name: PGSSLMODE
            value: "require"
          - name: PGPASSWORD
            secretRef: pg-pwd
        args:
          - >-
            make build-all &&
            make -C subsystems/22-operations bin/ops-driver &&
            COB_LIBRARY_PATH=/workspace/subsystems/22-operations/bin:/workspace/shared/util/aud-write/bin:/workspace/subsystems/21-audit/bin:/workspace/subsystems/20-integrationout/bin:/workspace/shared/util/shared-log/bin
            LD_LIBRARY_PATH=/workspace/shared/util/mq-publish/bin
            LD_PRELOAD=/usr/local/lib/libocesql.so
            subsystems/22-operations/bin/ops-driver
        resources:
          cpu: 1.0
          memory: 2.0Gi
