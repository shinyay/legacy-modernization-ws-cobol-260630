# infra/compose.customer-init.yaml — 03-customer rehost init job（ADR-0026,0027）
#
# 目的: マスタ「顧客（customer）」を共有ランタイム image でコンテナ化し、
#       cust-load で ISAM 索引 customer.idx を生成する init_job を1つ起動する。
#       ローカル compose の "customer-init" が ACA Jobs の Manual(once) に対応。
#
# 起動ルート: 正規ローダ ops-master-load.sh customers（flock + audit best-effort）。
# ストレージ: subsystems/03-customer/data に seed(customers-mvp.dat) と索引が同居。
#   ACA では Azure Files マウントに対応（空開始のため seed 事前アップロードが必要）。
# ACA Jobs 写像: 共有 image `practice-bank:app-latest` 再利用（infra/job-master-load.yaml, MASTER=customers）。
services:
  customer-init:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: practice-bank-runtime:latest
    working_dir: /workspace
    environment:
      TZ: Asia/Tokyo
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PGHOST: ${PGHOST:-postgres}
      PGUSER: ${PGUSER:-cobol}
      PGPASSWORD: ${PGPASSWORD:-cobol}
      PGDATABASE: ${PGDATABASE:-banking}
    volumes:
      - customer-data:/workspace/subsystems/03-customer/data
    command:
      - bash
      - -lc
      - >-
        make -C subsystems/03-customer build &&
        bash subsystems/22-operations/src/ops-master-load.sh customers
    restart: "no"

volumes:
  customer-data:
    driver: local
