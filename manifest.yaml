# 移行対象 COBOL プログラムの台帳（triage.md がここから「次の1本」を選ぶ）
# ライブな進行状況は GitHub Issues / Projects、静的な inventory はこの manifest が担う。
#
# status: todo | in-progress | rewritten | fallback | done
# kind:   batch | interactive
# format: free | fixed（COBOL ソース形式。既定 free。固定形式 legacy〈例: legacy/cobol-examples/〉は fixed）
# migratable: yes | review | later
# calls/copybooks/files/hotspots: 依存解析結果（tools/deps/analyze.sh）を反映
# sql: true | false（EXEC SQL を含むか）
#
# triage 方針（v0）:
# - 現在のサンプル群は CALL/COPY 依存が薄く、主目的は COBOL 構文・意味論の検証。
# - そのため v0 は dependency-driven より hotspot-driven を主軸にする。
# - hotspots は「次に検証する COBOL 意味論」の選定に使う。
# - migratable は移行優先度（yes/review/later）として別軸で扱う。
#
# triage 方針（v1 以降）:
# - 実案件のように CALL/COPY/copybook/job flow 依存が豊富な資産では、
#   dependency-driven triage（leaf 優先の順序決定）を追加で有効化する。
#
# ※当日、支給 COBOL を legacy/ に取り込んだら各プログラムをここに列挙する。
#   以下はテンプレート（実体ではない）。

programs:
